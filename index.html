            function updateUI() { ... }  // misma lógica, pero ahora usa spinHistory, originalLevels, etc.

            // ---------- POLLING A LA API ----------
            async function fetchLatest() {
                try {
                    const response = await fetch('/api/history?limit=100');
                    const games = await response.json();
                    // Si no hay historial previo o cambió, actualizar
                    if (games.length > 0) {
                        // Comparar con el último game_id conocido
                        const lastKnown = spinHistory.length > 0 ? spinHistory[spinHistory.length-1].game_id : null;
                        const newGames = lastKnown ? games.filter(g => g.game_id > lastKnown) : games; // asumiendo orden cronológico
                        newGames.forEach(game => processOutcome(game));
                        updateUI();
                    }
                } catch (e) {
                    console.error('Error fetching data:', e);
                }
            }

            // Iniciar polling cada 3 segundos
            setInterval(fetchLatest, 3000);
            // Carga inicial
            fetchLatest();
